server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fitsphere
    username: fitsphere
    password: fitsphere
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6380

  # ── Email OTP (optional) ────────────────────────────────────────────────────
  # Leave host blank to run in dev mode (OTP returned in API response instead of emailed).
  # For Gmail: enable 2FA → generate an App Password → paste below.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-very-long-secret-key-for-dev}
    expiration-seconds: 7200
  ai:
    base-url: http://localhost:8000

# ── Twilio SMS (optional) ──────────────────────────────────────────────────────
# Leave blank to run in dev mode (OTP printed in logs + returned in API response).
# Sign up at https://twilio.com → get Account SID, Auth Token, and a phone number.
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

# ── Google OAuth (optional) ────────────────────────────────────────────────────
# Create a project at https://console.cloud.google.com → OAuth 2.0 Client IDs
# Set the same client ID in NEXT_PUBLIC_GOOGLE_CLIENT_ID on the frontend.
fitsphere:
  google:
    client-id: ${GOOGLE_CLIENT_ID:209019746426-pgeurp1ab3u95o77qp4v4i8t7irdu83d.apps.googleusercontent.com}
